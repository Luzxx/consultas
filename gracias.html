<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago confirmado — Consulta Veraz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#fff;border-radius:16px;padding:3rem 2rem;text-align:center;max-width:480px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.icon{width:72px;height:72px;border-radius:50%;background:#EAF3DE;border:2px solid #97C459;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem}
.icon svg{width:32px;height:32px;color:#3B6D11}
h1{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:400;margin-bottom:.75rem;color:#1a1a1a}
p{font-size:14px;color:#666;line-height:1.75;margin-bottom:1.5rem}
.highlight{background:#E6F1FB;border-radius:10px;padding:1rem;font-size:13px;color:#185FA5;line-height:1.6}
.back-btn{display:inline-block;margin-top:1.5rem;padding:10px 24px;background:#0C447C;color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500}
</style>
</head>
<body>
<div class="card">
  <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
  <h1>¡Pago recibido!</h1>
  <p>Tu pago fue procesado correctamente. En breve recibirás el informe Veraz completo con tu score crediticio y asesoramiento personalizado en tu email.</p>
  <div class="highlight">Revisá tu bandeja de entrada en las próximas horas. Si no lo encontrás, revisá la carpeta de spam.</div>
  <a href="/" class="back-btn">Volver al inicio</a>
</div>
</body>
</html>
